<div id="tracking-result" class="tracking-result-box">
    <div class="result-header">
        <div>
            <span class="label">Shipment Number</span>
            <h3 id="shipment-id">ASL-8829104</h3>
        </div>
        <div class="status-badge delivered">Delivered</div>
    </div>

    <div class="tracking-timeline">
        <div class="step completed">
            <div class="dot"></div>
            <span>Booked</span>
        </div>
        <div class="step active">
            <div class="dot"></div>
            <span>In Transit</span>
        </div>
        <div class="step">
            <div class="dot"></div>
            <span>Arrival (HGA)</span>
        </div>
    </div>

    <div class="shipment-details">
        <p><strong>Current Location:</strong> Dubai Hub (DXB)</p>
        <p><strong>Estimated Arrival:</strong> 22nd April 2026</p>
    </div>
</div>
<script>
    const form = document.getElementById('tracking-page-form');
    const output = document.getElementById('tracking-output');
    const btn = document.getElementById('track-btn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Add loading state
        btn.parentElement.classList.add('loading');
        btn.disabled = true;

        // Simulate a 1.5s delay to "find" the shipment
        setTimeout(() => {
            btn.parentElement.classList.remove('loading');
            btn.disabled = false;
            
            // Show the result
            output.style.display = 'block';
            
            // Smooth scroll to the result
            output.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 1500);
    });
</script>
